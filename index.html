<!DOCTYPE html>

<head>

    <title>Smart Water Tank Controller</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="logo.png" alt="Smart Tank Logo">
            </div>

            <div class="nav-right">
                <a href="#" class="app-btn">App</a>
                <div class="menu-icon">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <div class="hero-image">
                <img src="hero-product.png" alt="Smart Tank System">
            </div>
            
            <div class="hero-text">
                <h1>স্মার্ট ওয়াটার ট্যাঙ্ক কন্ট্রোলার</h1>

            <div class="card">
